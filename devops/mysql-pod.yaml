apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
spec:
  containers:
  - name: mysql
    image: mysql:5.7
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: "yourpassword"
    volumeMounts:
    - mountPath: "/var/lib/mysql"
      name: mysql-storage
    resources:
      limits:
        memory: "512Mi"
        cpu: "500m"
      requests:
        memory: "256Mi"
        cpu: "250m"
  volumes:
  - name: mysql-storage
    persistentVolumeClaim:
      claimName: mysql-pvc