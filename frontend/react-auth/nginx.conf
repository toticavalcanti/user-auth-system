server {
    listen 80;
    server_name _;  # Aceita qualquer nome de servidor

    root /usr/share/nginx/html;
    index index.html;

    # Configuração de CORS
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' '*' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # Rotas do React
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Rota para arquivos estáticos
    location /static/ {
        add_header Cache-Control "public, max-age=31536000";
    }

    # Configuração dinâmica com variáveis de ambiente
    location = /config.js {
        default_type application/javascript;
        return 200 'window._env_ = { 
            REACT_APP_API_URL: "${REACT_APP_API_URL}",
            ENV: "${ENV:-production}"
        };';
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy para a API (usando o serviço interno do Kubernetes)
    location /api/ {
        # Redireciona para o serviço Kubernetes diretamente
        proxy_pass http://auth-api-service:3000;  # Nome do serviço Kubernetes
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Páginas de erro
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
