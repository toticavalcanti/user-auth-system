server {
    listen 80;
    server_name localhost;

    # Diretório raiz onde os arquivos estáticos do React são servidos
    root /usr/share/nginx/html;

    # Configurar o Nginx para substituir variáveis no runtime
    location / {
        # Substituir variáveis de ambiente no arquivo de build
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html =404;
    }

    location /static/ {
        # Não aplicar substituição em arquivos estáticos
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Substituir as variáveis no runtime
    location /config.js {
        default_type "application/javascript";
        return 200 'window._env_ = {
            REACT_APP_API_URL: "$REACT_APP_API_URL"
        }';
    }
}
